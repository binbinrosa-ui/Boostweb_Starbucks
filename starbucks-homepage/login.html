<!DOCTYPE html>
<html lang="ko">

<head>
    <title>Sign In - Starbucks Korea - 스타벅스 코리아</title>
    <link rel="icon" href="images/icon.png" type="image/gif" sizes="16x16">
    <meta content="text/html;charset=utf-8" http-equiv="Content-Type">
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <meta content="스타벅스 코리아 로그인" name="description" />
    <meta content="스타벅스, 로그인, 회원" name="keywords" />
    <meta content="Starbucks Korea" name="author" />
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- AOS Animation -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="css/style.css" rel="stylesheet" type="text/css">
    
    <style>
        /* 로그인 페이지 개선 */
        .btn-login[disabled] {
            cursor: not-allowed;
            opacity: 0.7;
        }
        
        .alert-info {
            border-radius: 8px;
        }
        
        .alert-info code {
            background: rgba(33, 150, 243, 0.1);
            color: #1976d2;
            padding: 2px 4px;
            border-radius: 3px;
            font-size: 12px;
        }
    </style>
    <!-- Component Loader -->
    <script src="js/load-components.js" defer></script>
</head> 

<body>
    <div id="wrapper">
        <!-- Preloader -->
        <div id="preloader">
            <div class="preloader1"></div>
        </div>

        <!-- Header Placeholder (컴포넌트로 로드됨) -->
        <div id="header-placeholder"></div>

        <!-- Content -->
        <div class="no-bottom no-top" id="content">
            <div id="top"></div>
            
            <!-- Login Section -->
            <section class="login-section pt100 pb100">
                <div class="container">
                    <div class="row justify-content-center">
                        <div class="col-md-5 col-lg-4">
                            <div class="login-box" data-aos="fade-up">
                                <div class="login-header text-center mb-4">
                                    <h2 class="login-title">Sign In</h2>
                                    <p class="login-subtitle">스타벅스 코리아에 오신 것을 환영합니다</p>
                                </div>

                                <form id="loginForm" class="login-form">
                                    <div class="form-group mb-3">
                                        <label for="loginEmail" class="form-label">이메일 주소</label>
                                        <input type="email" class="form-control" id="loginEmail" name="email" placeholder="이메일 주소를 입력하세요" required>
                                    </div>

                                    <div class="form-group mb-4">
                                        <label for="loginPassword" class="form-label">비밀번호</label>
                                        <div class="password-input-wrapper">
                                            <input type="password" class="form-control" id="loginPassword" name="password" placeholder="비밀번호를 입력하세요" required>
                                            <button type="button" class="password-toggle" id="passwordToggle">
                                                <i class="fas fa-eye"></i>
                                            </button>
                                        </div>
                                    </div>

                                    <div class="form-check mb-4">
                                        <input class="form-check-input" type="checkbox" id="rememberMe" name="rememberMe">
                                        <label class="form-check-label" for="rememberMe">
                                            로그인 상태 유지
                                        </label>
                                    </div>

                                    <button type="submit" class="btn btn-login w-100 mb-3">
                                        로그인
                                    </button>

                    <div id="loginError" class="alert alert-danger" style="display: none;"></div>
                    <div id="loginSuccess" class="alert alert-success" style="display: none;"></div>

                                    <div class="login-links text-center mt-4">
                                        <a href="join.html" class="login-link">회원가입</a>
                                        <span class="login-separator">|</span>
                                        <a href="#" class="login-link">이메일 찾기</a>
                                        <span class="login-separator">|</span>
                                        <a href="#" class="login-link">비밀번호 찾기</a>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

        </div>
        <!-- content close -->

        <!-- Footer Placeholder (컴포넌트로 로드됨) -->
        <div id="footer-placeholder"></div>

        <!-- Back to Top -->
        <a href="#" id="back-to-top"></a>
    </div>

    <!-- Javascript Files -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    
    <!-- Firebase: 설정 로드 후 Authentication 사용 -->
    <script type="module" src="app.js"></script>
    <!-- 인증 상태 관리 -->
    <script type="module" src="js/auth-state.js"></script>
    
    <script type="module">
        // 로그인: Firebase Authentication으로 처리 (비밀번호는 Firebase가 검증)
        // Initialize AOS
        AOS.init({
            duration: 800,
            easing: 'ease-in-out',
            once: true
        });

        // Password toggle
        const passwordToggle = document.getElementById('passwordToggle');
        const loginPassword = document.getElementById('loginPassword');
        
        if (passwordToggle && loginPassword) {
            passwordToggle.addEventListener('click', function() {
                const type = loginPassword.getAttribute('type') === 'password' ? 'text' : 'password';
                loginPassword.setAttribute('type', type);
                const icon = this.querySelector('i');
                icon.classList.toggle('fa-eye');
                icon.classList.toggle('fa-eye-slash');
            });
        }

        // Firebase 초기화 간단 체크
        console.log('🔄 [Login] 페이지 로드됨');
        
        // Firebase 준비 상태 확인
        window.addEventListener('firebase-ready', () => {
            console.log('✅ [Login] Firebase 준비 완료');
        });
        
        // 5초 후에도 Firebase가 준비되지 않으면 간단한 알림
        setTimeout(() => {
            if (!window.auth) {
                console.log('⚠️ [Login] Firebase 초기화 지연 - 로그인 시도는 여전히 가능');
            }
        }, 5000);


        // Login form submission
        const loginForm = document.getElementById('loginForm');
        if (loginForm) {
            loginForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const email = document.getElementById('loginEmail').value;
                const password = document.getElementById('loginPassword').value;
                const rememberMe = document.getElementById('rememberMe').checked;
                
                const errorDiv = document.getElementById('loginError');
                const successDiv = document.getElementById('loginSuccess');
                const submitBtn = document.querySelector('button[type="submit"]');
                
                // Hide previous messages
                errorDiv.style.display = 'none';
                successDiv.style.display = 'none';
                
                // Show loading state
                if (submitBtn) {
                    submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>로그인 중...';
                    submitBtn.disabled = true;
                }
                
                try {
                    console.log('🔄 [Login] 로그인 시도:', email);
                    
                    // Firebase Authentication 로그인 시도
                    const { firebaseLogin } = await import('./js/firebase-auth.js');
                    const result = await firebaseLogin(email, password);
                    
                    console.log('📊 [Login] Firebase 로그인 결과:', result);
                    
                    if (result.success) {
                        // Store user info in localStorage or sessionStorage based on rememberMe
                        const storage = rememberMe ? localStorage : sessionStorage;
                        storage.setItem('userInfo', JSON.stringify(result.user));
                        
                        console.log('✅ [Firebase] 로그인 성공:', result.user);
                        
                        // 로그인 버튼 상태 변경
                        if (submitBtn) {
                            submitBtn.innerHTML = '<i class="fas fa-check me-2"></i>로그인 성공!';
                            submitBtn.disabled = true;
                            submitBtn.style.backgroundColor = '#28a745';
                            submitBtn.style.borderColor = '#28a745';
                        }
                        
                        // 카운트다운과 함께 성공 메시지 표시
                        let countdown = 3;
                        successDiv.innerHTML = `<i class="fas fa-check-circle me-2"></i>${result.message} ${countdown}초 후 메인 페이지로 이동합니다.`;
                        successDiv.style.display = 'block';
                        
                        const countdownTimer = setInterval(() => {
                            countdown--;
                            if (countdown > 0) {
                                successDiv.innerHTML = `<i class="fas fa-check-circle me-2"></i>${result.message} ${countdown}초 후 메인 페이지로 이동합니다.`;
                            } else {
                                successDiv.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>메인 페이지로 이동 중...';
                                clearInterval(countdownTimer);
                                
                                // Redirect to main page
                                setTimeout(() => {
                                    window.location.href = 'index.html';
                                }, 500);
                            }
                        }, 1000);
                    } else {
                        errorDiv.innerHTML = '<i class="fas fa-exclamation-triangle me-2"></i>' + (result.message || '로그인에 실패했습니다.');
                        errorDiv.style.display = 'block';
                        console.error('❌ [Firebase] 로그인 실패:', result.error);
                        
                        // Reset button state
                        if (submitBtn) {
                            submitBtn.innerHTML = '로그인';
                            submitBtn.disabled = false;
                            submitBtn.style.backgroundColor = '';
                            submitBtn.style.borderColor = '';
                        }
                    }
                } catch (error) {
                    console.error('Firebase login error:', error);
                    
                    // 로컬 테스트 계정 확인 (Firebase 실패 시 대체)
                    if (email === 'test@example.com' && password === 'test123') {
                        console.log('🔧 [Login] 로컬 테스트 계정으로 로그인');
                        
                        successDiv.innerHTML = '<i class="fas fa-check-circle me-2"></i>테스트 로그인 성공! 메인 페이지로 이동합니다.';
                        successDiv.style.display = 'block';
                        errorDiv.style.display = 'none';
                        
                        if (submitBtn) {
                            submitBtn.innerHTML = '<i class="fas fa-check me-2"></i>테스트 로그인 성공!';
                            submitBtn.style.backgroundColor = '#28a745';
                            submitBtn.style.borderColor = '#28a745';
                        }
                        
                        // 로컬 스토리지에 테스트 사용자 정보 저장
                        localStorage.setItem('testUser', JSON.stringify({
                            email: 'test@example.com',
                            name: '테스트 사용자',
                            loginTime: new Date().toISOString()
                        }));
                        
                        setTimeout(() => {
                            window.location.href = 'index.html';
                        }, 2000);
                        
                        return;
                    }
                    
                    // 일반 오류 메시지 표시
                    if (error.message.includes('Firebase') || error.message.includes('auth/') || error.message.includes('network')) {
                        errorDiv.innerHTML = `
                            <i class="fas fa-exclamation-circle me-2"></i>
                            <strong>로그인 실패</strong><br>
                            Firebase 서비스에 연결할 수 없습니다.<br>
                            <small class="text-muted mt-2">
                                <strong>테스트용:</strong> test@example.com / test123으로 시도해보세요.
                            </small>
                        `;
                    } else {
                        errorDiv.innerHTML = '<i class="fas fa-exclamation-circle me-2"></i>로그인 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.';
                    }
                    
                    errorDiv.style.display = 'block';
                    
                    // Reset button state
                    if (submitBtn) {
                        submitBtn.innerHTML = '로그인';
                        submitBtn.disabled = false;
                        submitBtn.style.backgroundColor = '';
                        submitBtn.style.borderColor = '';
                    }
                }
            });
        }

        // Back to top functionality
        const backToTopBtn = document.getElementById('back-to-top');
        if (backToTopBtn) {
            window.addEventListener('scroll', () => {
                if (window.pageYOffset > 300) {
                    backToTopBtn.classList.add('show');
                } else {
                    backToTopBtn.classList.remove('show');
                }
            });

            backToTopBtn.addEventListener('click', (e) => {
                e.preventDefault();
                window.scrollTo({
                    top: 0,
                    behavior: 'smooth'
                });
            });
        }
    </script>
</body>

</html>
